kind: pipeline
type: docker
name: default

clone:
  depth: 1

steps:
- name: build
  image: cimg/ruby:3.4.9-node
  environment:
    JEKYLL_ENV: production
    BUNDLE_PATH: vendor/bundle
  commands:
    - npm config set registry http://mirrors.cloud.tencent.com/npm
    - npm install
    - bundle config mirror.https://rubygems.org https://mirrors.cloud.tencent.com/rubygems
    - bundle install --verbose
    - bundle exec jekyll build --trace --verbose
  volumes:
  - name: dist
    path: /drone/src/_site
  - name: vendor
    path: /drone/src/vendor
  - name: jekyll-cache
    path: /drone/src/.jekyll-cache
  - name: node_modules
    path: /drone/src/node_modules
  when:
    branch: [main]

volumes:
- name: dist
  host:
    path: /home/ubuntu/docs.hmcl.net/www
- name: vendor
  host:
    path: /home/ubuntu/docs.hmcl.net/cache/vendor
- name: jekyll-cache
  host:
    path: /home/ubuntu/docs.hmcl.net/cache/jekyll-cache
- name: node_modules
  host:
    path: /home/ubuntu/docs.hmcl.net/cache/node_modules
